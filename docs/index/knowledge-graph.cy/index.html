  <script>
    if (window.cytoscape && window.cytoscapeFcose) {
      cytoscape.use(window.cytoscapeFcose);
    }

    const LAYOUTS = {
      fcose: {
        name: 'fcose',
        quality: 'default',
        randomize: true,
        animate: false,
        fit: true,
        padding: 30,
        nodeSeparation: 90,
        idealEdgeLength: 110,
        nodeRepulsion: 6500,
        gravity: 0.25,
        gravityRangeCompound: 1.5,
        gravityCompound: 1.0,
        nestingFactor: 0.1,
        numIter: 2500,
        tile: true,
        packComponents: true
      },
      cose: {
        name: 'cose',
        animate: false, fit: true, padding: 30,
        nodeRepulsion: 400000, idealEdgeLength: 120,
        edgeElasticity: 100, nestingFactor: 1.2,
        gravity: 80, numIter: 2000
      },
      concentric: { name: 'concentric', animate: false, fit: true, padding: 30 },
      grid:       { name: 'grid',       animate: false, fit: true, padding: 30 },
      circle:     { name: 'circle',     animate: false, fit: true, padding: 30 },
      breadthfirst:{name: 'breadthfirst',animate: false, fit: true, padding: 30,
                    directed: true, spacingFactor: 1.1 }
    };

    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: window.cyElements || [],
      style:    window.cyStyle    || [],
      layout:   LAYOUTS.fcose,
      wheelSensitivity: 0.2
    });

    const counts = document.getElementById('counts');
    counts.textContent =
      cy.nodes(':parent').length + ' clusters · ' +
      cy.nodes().not(':parent').length + ' nodes · ' +
      cy.edges().length + ' edges';

    document.getElementById('run-layout').addEventListener('click', () => {
      const name = document.getElementById('layout-select').value;
      cy.layout(LAYOUTS[name]).run();
    });
    document.getElementById('layout-select').addEventListener('change', e => {
      cy.layout(LAYOUTS[e.target.value]).run();
    });
    document.getElementById('fit').addEventListener('click', () => cy.fit(30));
    document.getElementById('hide-cross').addEventListener('change', e => {
      cy.edges('[?cross]').style('display', e.target.checked ? 'none' : 'element');
    });

    // Click a node → log its data (handy when exploring a 200+ node graph).
    cy.on('tap', 'node', evt => console.log(evt.target.data()));
  </script>
